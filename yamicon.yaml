colorscheme:
  clean-dark

options:
  mapleader: ' '
  maplocalleader: ' '
  tabstop: 2
  softtabstop: 2
  shiftwidth: 2
  !wrap
  cursorline
  signcolumn: yes:1

ft-autocmds:
  python:
    options:
      shiftwidth: 4
      tabstop: 4
      softtabstop: 4
    colorscheme:
      theme: olivetone
  oil:
    colorscheme:
      theme: clean-dark
  javascript:
    colorscheme:
      theme: olivetone
  typescript:
    match: javascript
  rust:
    options:
      shiftwidth: 4
      tabstop: 4
      softtabstop: 4
    colorscheme:
      theme: rusttone
  yaml:
    match: oil
  lua:
    colorscheme:
      theme: default
      Normal:
        bg: "#000000"
  terminal:
    match: lua

commands:
  Open:
    :silent !firefox %

keybinds:
  # === Global ===
  ^n:
    modes: niv
    cmd: lua if vim.o.number then vim.cmd("set nonu nornu") else vim.cmd("set nu rnu") end
  ^g:
    modes: niv
    cmd: Gitsigns toggle_signs
  ^f:
    modes: n
    cmd: Format
  ^f:
    modes: v
    cmd: CaseShiftPicker

  # === Telescope ===
  <leader>ff:
    modes: n
    cmd: Telescope find_files
  <leader>fg:
    modes: n
    cmd: Telescope live_grep
  <leader>fb:
    modes: n
    cmd: Telescope buffers
  <leader>fs:
    modes: n
    cmd: Telescope symbols
  <leader>fm:
    modes: n
    cmd: Telescope media_files

  # === Oil ===
  -:
    modes: n
    cmd: Oil
  _:
    modes: n
    cmd: vsplit | Oil
  ^v:
    modes: n
    buffertypes: Oil
    cmd: lua require("oil.actions").select.callback({vertical = true})
  ^x:
    modes: n
    buffertypes: Oil
    cmd: lua require("oil.actions").select.callback({horizontal = true})

  # --- Fold-up ---
  <leader>fu:
    modes: n
    cmd: Fold
  <leader>uf:
    modes: n
    cmd:Unfold

  # --- Runner ---
  <leader>rr:
    modes: n
    cmd: BugChaserRun
  <leader>vv:
    modes: n
    cmd: BugChaserToggleDiagnosticVirtualLines
  ^r:
    modes: v
    run: BugChaserRun

  # --- Multicursor ---
  <C-Up>:
    modes: niv
    cmd: MultipleCursorsAddUp
  <C-Down>:
    modes: niv
    cmd: MultipleCursorsAddDown

  # --- Open ---
  ^o:
    modes: v
    cmd: Open
  <leader>oo:
    modes: n
    cmd: Telescope open
