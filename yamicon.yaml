options:
  mapleader: ' '
  maplocalleader: ' '
  tabstop: 2
  softtabstop: 2
  shiftwidth: 2
  !wrap

commands:
  Run:
    cmd: BugChaserRun
    desc: Run current buffer through bug-chaser

keybinds:
  # --- Telescope ---
  <leader>ff:
    modes: n
    cmd: Telescope find_files
  <leader>fg:
    modes: n
    cmd: Telescope live_grep
  <leader>fb:
    modes: n
    cmd: Telescope buffers

  # --- Oil ---
  -:
    modes: n
    cmd: Oil

  # --- Runner ---
  <leader>rr:
    modes: n
    cmd: Run
